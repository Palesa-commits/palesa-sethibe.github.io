<svg width="100%" viewBox="0 0 680 240" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Early screening support banner - bold modern</title>
  <desc>Bold modern banner with a child figure surrounded by supportive shapes and the project tagline.</desc>

  <!-- Dark background block -->
  <rect x="0" y="0" width="680" height="240" rx="0" fill="#26215C"/>

  <!-- Accent stripe left -->
  <rect x="0" y="0" width="8" height="240" fill="#5DCAA5"/>

  <!-- Big circle backdrop behind child -->
  <circle cx="340" cy="115" r="90" fill="#3C3489"/>

  <!-- Orbiting accent dots -->
  <circle cx="258" cy="68" r="10" fill="#5DCAA5"/>
  <circle cx="422" cy="68" r="7" fill="#EF9F27"/>
  <circle cx="240" cy="148" r="6" fill="#AFA9EC"/>
  <circle cx="440" cy="150" r="9" fill="#5DCAA5" opacity="0.6"/>
  <circle cx="340" cy="30" r="5" fill="#EF9F27" opacity="0.8"/>

  <!-- Child figure -->
  <!-- Head -->
  <circle cx="340" cy="75" r="24" fill="#FAC775"/>
  <!-- Body -->
  <rect x="320" y="98" width="40" height="42" rx="10" fill="#534AB7"/>
  <!-- Left arm raised -->
  <line x1="320" y1="108" x2="292" y2="82" stroke="#FAC775" stroke-width="10" stroke-linecap="round"/>
  <!-- Right arm raised -->
  <line x1="360" y1="108" x2="388" y2="82" stroke="#FAC775" stroke-width="10" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="330" y1="140" x2="322" y2="168" stroke="#534AB7" stroke-width="10" stroke-linecap="round"/>
  <line x1="350" y1="140" x2="358" y2="168" stroke="#534AB7" stroke-width="10" stroke-linecap="round"/>

  <!-- Star above child's head -->
  <text x="340" y="46" font-size="20" text-anchor="middle" fill="#EF9F27">★</text>

  <!-- Left text block -->
  <text x="52" y="95" font-family="sans-serif" font-size="13" font-weight="400" fill="#9FE1CB" letter-spacing="3">LEARNING DIFFICULTY SCREENING</text>
  <text x="52" y="128" font-family="sans-serif" font-size="32" font-weight="500" fill="white">Every child</text>
  <text x="52" y="164" font-family="sans-serif" font-size="32" font-weight="500" fill="#5DCAA5">deserves</text>
  <text x="52" y="200" font-family="sans-serif" font-size="32" font-weight="500" fill="white">early support.</text>

  <!-- Right text block -->
  <text x="628" y="110" font-family="sans-serif" font-size="12" font-weight="400" fill="#AFA9EC" text-anchor="end">For parents</text>
  <text x="628" y="130" font-family="sans-serif" font-size="12" font-weight="400" fill="#AFA9EC" text-anchor="end">For teachers</text>
  <text x="628" y="150" font-family="sans-serif" font-size="12" font-weight="400" fill="#AFA9EC" text-anchor="end">For schools</text>

  <!-- Bottom bar -->
  <rect x="0" y="222" width="680" height="18" fill="#534AB7"/>
  <text x="340" y="235" font-family="sans-serif" font-size="11" font-weight="400" fill="#CECBF6" text-anchor="middle" letter-spacing="1">SCREEN EARLY · ACT EARLY · SUPPORT ALWAYS</text>
</svg>
